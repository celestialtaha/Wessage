name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Build APKs (watch + phone foss)
        run: |
          ./gradlew :app:assembleRelease
          (cd external/Messages-phone && ./gradlew :app:assembleFossRelease)

      - name: Detect unsigned APK paths
        id: detect
        run: |
          if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            echo "watch_unsigned_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "watch_unsigned_exists=false" >> "$GITHUB_OUTPUT"
          fi

          PHONE_UNSIGNED_APK="$(find external/Messages-phone/app/build/outputs/apk/foss/release -maxdepth 1 -type f -name '*unsigned*.apk' | sort | head -n 1 || true)"
          if [ -n "$PHONE_UNSIGNED_APK" ] && [ -f "$PHONE_UNSIGNED_APK" ]; then
            echo "phone_unsigned_exists=true" >> "$GITHUB_OUTPUT"
            echo "phone_unsigned_apk=$PHONE_UNSIGNED_APK" >> "$GITHUB_OUTPUT"
          else
            echo "phone_unsigned_exists=false" >> "$GITHUB_OUTPUT"
            echo "phone_unsigned_apk=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check signing secrets availability
        id: signing_ready
        env:
          KEY_B64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_ALIAS }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEY_B64" ] && [ -n "$KEY_ALIAS" ] && [ -n "$STORE_PASS" ] && [ -n "$KEY_PASS" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign release APKs (optional)
        id: sign_release
        if: steps.signing_ready.outputs.enabled == 'true'
        env:
          KEY_B64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_ALIAS }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PHONE_UNSIGNED_APK: ${{ steps.detect.outputs.phone_unsigned_apk }}
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$RUNNER_TEMP/release-keystore.jks"
          ZIPALIGN="${ANDROID_SDK_ROOT}/build-tools/36.0.0/zipalign"
          APKSIGNER="${ANDROID_SDK_ROOT}/build-tools/36.0.0/apksigner"

          SANITIZED_KEY="${KEY_B64#data:*;base64,}"
          SANITIZED_KEY="$(printf '%s' "$SANITIZED_KEY" | tr -d '\r\n\t ')"

          if [ -z "$SANITIZED_KEY" ]; then
            echo "ANDROID_SIGNING_KEY_BASE64 is empty after sanitization."
            exit 1
          fi

          if ! printf '%s' "$SANITIZED_KEY" | base64 --decode > "$KEYSTORE_PATH" 2>/dev/null; then
            if ! printf '%s' "$SANITIZED_KEY" | openssl base64 -d -A > "$KEYSTORE_PATH" 2>/dev/null; then
              echo "Invalid ANDROID_SIGNING_KEY_BASE64 secret. Recreate it from your .jks file as a single-line base64 string."
              exit 1
            fi
          fi

          if ! keytool -list -keystore "$KEYSTORE_PATH" -storepass "$STORE_PASS" >/dev/null 2>&1; then
            echo "Keystore decode succeeded but keystore/password validation failed."
            exit 1
          fi

          if ! keytool -list -keystore "$KEYSTORE_PATH" -storepass "$STORE_PASS" -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "Key alias '$KEY_ALIAS' not found in keystore."
            exit 1
          fi

          if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            WATCH_UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
            WATCH_ALIGNED_APK="app/build/outputs/apk/release/app-release-aligned.apk"
            WATCH_SIGNED_APK="app/build/outputs/apk/release/app-release-signed.apk"
            "$ZIPALIGN" -f -p 4 "$WATCH_UNSIGNED_APK" "$WATCH_ALIGNED_APK"
            "$APKSIGNER" sign \
              --ks "$KEYSTORE_PATH" \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass "pass:${STORE_PASS}" \
              --key-pass "pass:${KEY_PASS}" \
              --out "$WATCH_SIGNED_APK" \
              "$WATCH_ALIGNED_APK"
            "$APKSIGNER" verify "$WATCH_SIGNED_APK"
            echo "watch_signed_release_file=$WATCH_SIGNED_APK" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${PHONE_UNSIGNED_APK}" ] && [ -f "${PHONE_UNSIGNED_APK}" ]; then
            PHONE_ALIGNED_APK="${PHONE_UNSIGNED_APK%-unsigned.apk}-aligned.apk"
            PHONE_SIGNED_APK="${PHONE_UNSIGNED_APK%-unsigned.apk}-signed.apk"
            "$ZIPALIGN" -f -p 4 "${PHONE_UNSIGNED_APK}" "${PHONE_ALIGNED_APK}"
            "$APKSIGNER" sign \
              --ks "$KEYSTORE_PATH" \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass "pass:${STORE_PASS}" \
              --key-pass "pass:${KEY_PASS}" \
              --out "${PHONE_SIGNED_APK}" \
              "${PHONE_ALIGNED_APK}"
            "$APKSIGNER" verify "${PHONE_SIGNED_APK}"
            echo "phone_signed_release_file=${PHONE_SIGNED_APK}" >> "$GITHUB_OUTPUT"
          fi

          rm -f "$KEYSTORE_PATH"

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p dist
          WATCH_VERSION="${GITHUB_REF_NAME#v}"
          PHONE_VERSION="$(awk -F= '/^VERSION_NAME=/{print $2}' external/Messages-phone/gradle.properties | tr -d '\r[:space:]')"
          if [ -z "${PHONE_VERSION}" ]; then
            PHONE_VERSION="${WATCH_VERSION}"
          fi

          WATCH_SOURCE=""
          WATCH_SUFFIX=""
          if [ -n "${{ steps.sign_release.outputs.watch_signed_release_file }}" ] && [ -f "${{ steps.sign_release.outputs.watch_signed_release_file }}" ]; then
            WATCH_SOURCE="${{ steps.sign_release.outputs.watch_signed_release_file }}"
            WATCH_SUFFIX="signed"
          elif [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            WATCH_SOURCE="app/build/outputs/apk/release/app-release.apk"
            WATCH_SUFFIX="release"
          elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            WATCH_SOURCE="app/build/outputs/apk/release/app-release-unsigned.apk"
            WATCH_SUFFIX="unsigned"
          fi
          if [ -z "$WATCH_SOURCE" ]; then
            echo "Watch release APK not found."
            exit 1
          fi
          cp "$WATCH_SOURCE" "dist/wessage-watch-v${WATCH_VERSION}-release-${WATCH_SUFFIX}.apk"

          PHONE_RELEASE_DIR="external/Messages-phone/app/build/outputs/apk/foss/release"
          PHONE_SOURCE=""
          PHONE_SUFFIX=""
          if [ -n "${{ steps.sign_release.outputs.phone_signed_release_file }}" ] && [ -f "${{ steps.sign_release.outputs.phone_signed_release_file }}" ]; then
            PHONE_SOURCE="${{ steps.sign_release.outputs.phone_signed_release_file }}"
            PHONE_SUFFIX="signed"
          else
            PHONE_NON_UNSIGNED="$(find "$PHONE_RELEASE_DIR" -maxdepth 1 -type f -name '*.apk' ! -name '*unsigned*.apk' ! -name '*-aligned.apk' ! -name '*-signed.apk' | sort | head -n 1 || true)"
            PHONE_UNSIGNED="$(find "$PHONE_RELEASE_DIR" -maxdepth 1 -type f -name '*unsigned*.apk' | sort | head -n 1 || true)"
            if [ -n "$PHONE_NON_UNSIGNED" ] && [ -f "$PHONE_NON_UNSIGNED" ]; then
              PHONE_SOURCE="$PHONE_NON_UNSIGNED"
              PHONE_SUFFIX="release"
            elif [ -n "$PHONE_UNSIGNED" ] && [ -f "$PHONE_UNSIGNED" ]; then
              PHONE_SOURCE="$PHONE_UNSIGNED"
              PHONE_SUFFIX="unsigned"
            fi
          fi
          if [ -z "$PHONE_SOURCE" ]; then
            echo "Phone foss release APK not found."
            exit 1
          fi
          cp "$PHONE_SOURCE" "dist/wessage-phone-foss-v${PHONE_VERSION}-release-${PHONE_SUFFIX}.apk"

          (cd dist && sha256sum *.apk > SHA256SUMS.txt)

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wessage-release-assets
          path: dist/

      - name: Generate release notes (git-cliff)
        id: git_cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body_path: CHANGES.md
          files: |
            dist/*.apk
            dist/SHA256SUMS.txt
