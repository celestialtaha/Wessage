tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
ignore_tags = ""
skip_tags = ""

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.
"""
body = """
{% if version %}## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## Unreleased{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope | upper_first }}:** {% endif %}{{ commit.message | split(pat=": ") | last | trim }}{% if commit.breaking %} **(breaking)**{% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^Merge", skip = true },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^feat(\\(.+\\))?!?:", group = "Features" },
  { message = "^fix(\\(.+\\))?!?:", group = "Bug Fixes" },
  { message = "^perf(\\(.+\\))?!?:", group = "Performance" },
  { message = "^refactor(\\(.+\\))?!?:", group = "Refactoring" },
  { message = "^docs(\\(.+\\))?!?:", group = "Documentation" },
  { message = "^test(\\(.+\\))?!?:", group = "Tests" },
  { message = "^build(\\(.+\\))?!?:", group = "Build System" },
  { message = "^ci(\\(.+\\))?!?:", group = "CI" },
  { message = "^chore(\\(.+\\))?!?:", group = "Chores" },
  { message = "^revert(\\(.+\\))?!?:", group = "Reverts" },
]
protect_breaking_commits = true
filter_commits = true
topo_order = false
sort_commits = "oldest"
